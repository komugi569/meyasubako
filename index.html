<!DOCTYPE html>
<html lang="ja">

    <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js"
    }
  }
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの目安箱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>みんなの目安箱 📮</h1>
  
    <div id="auth-area" style="margin-top: 10px;">
    <button id="login-btn" style="padding: 5px 10px; cursor: pointer;">Googleアカウントでログイン</button>
    <span id="user-info" style="display: none; color: white;"></span>
    <button id="logout-btn" style="display: none; padding: 5px 10px; cursor: pointer; background-color: #ff4d4d; color: white; border: none; border-radius: 4px; margin-left: 10px; font-weight: bold;">ログアウト</button>
</div>
    
   
</header>

<div class="kairu-assistant" aria-live="polite">
    <div id="kairu-textbox" class="kairu-textbox">何かお困りのことはありますか？</div>
    <img id="kairu-image" src="kairu.png" alt="カイル" width="320" height="320">
</div>

    <main>
        <div class="tab-buttons" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
    <button data-tab="post" style="padding: 10px 20px; cursor: pointer;">📝 投稿する</button>
    <button data-tab="popular" style="padding: 10px 20px; cursor: pointer;">🔥 人気順</button>
    <button data-tab="new" style="padding: 10px 20px; cursor: pointer;">✨ 新着順</button>
</div>

<div id="post-section">
    <textarea id="suggestion-input" placeholder="学校を良くする意見を書いてね..." style="width: 100%; height: 100px; margin-bottom: 10px;"></textarea>
    <button id="submit-btn" style="padding: 10px; width: 100%;">投稿する</button>
</div>

<div id="list-section" style="display: none;">
    <ul id="suggestion-list" style="list-style-type: none; padding: 0;"></ul>
</div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
