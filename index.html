<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目安箱アプリ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <p class="brand-kicker">学校の声を集める</p>
                <h1>目安箱</h1>
            </div>

            <div class="auth-panel" aria-live="polite">
                <span id="user-info" class="user-info" hidden></span>
                <button id="login-btn" class="ghost-btn" type="button">ログイン</button>
                <button id="logout-btn" class="ghost-btn" type="button" hidden>ログアウト</button>
            </div>
        </div>

    </header>

    <main class="container">
        <section id="page-post" class="page-section">
            <div class="panel post-panel">
                <div class="section-heading">
                    <p class="section-label">Post</p>
                    <h2>新しい意見を投稿</h2>
                </div>

                <label class="input-label" for="suggestionText">意見の内容</label>
                <textarea id="suggestionText" placeholder="学校生活で気づいたこと、改善してほしいことを書いてください。"></textarea>
                <p id="post-helper" class="helper-text">投稿にはログインが必要です。</p>
                <button id="submit-btn" class="primary-btn" type="button" disabled>送信する</button>
            </div>
        </section>

        <section id="page-view" class="page-section dashboard-section">
            <div class="section-heading dashboard-heading">
                <p class="section-label">Explore</p>
                <h2>みんなの意見</h2>
            </div>

            <p id="dashboard-status" class="status-text" aria-live="polite"></p>

            <section class="category-section" aria-labelledby="popular-title">
                <div class="category-header">
                    <div>
                        <p class="section-label">Trending</p>
                        <h3 id="popular-title" class="section-title">人気順</h3>
                    </div>
                    <button class="more-btn" type="button" onclick="showCategoryDetail('popular', '人気順')">もっと見る</button>
                </div>
                <div id="popular-top3" class="post-grid"></div>
            </section>

            <section class="category-section" aria-labelledby="newest-title">
                <div class="category-header">
                    <div>
                        <p class="section-label">New</p>
                        <h3 id="newest-title" class="section-title">新着順</h3>
                    </div>
                    <button class="more-btn" type="button" onclick="showCategoryDetail('newest', '新着順')">もっと見る</button>
                </div>
                <div id="newest-top3" class="post-grid"></div>
            </section>

            <section class="category-section" aria-labelledby="trending-title">
                <div class="category-header">
                    <div>
                        <p class="section-label">Hot</p>
                        <h3 id="trending-title" class="section-title">話題順</h3>
                    </div>
                    <button class="more-btn" type="button" onclick="showCategoryDetail('trending', '話題順')">もっと見る</button>
                </div>
                <div id="trending-top3" class="post-grid"></div>
            </section>
        </section>

        <section id="page-detail" class="page-section" hidden>
            <button class="back-btn" type="button" onclick="backToDashboard()">戻る</button>
            <div class="section-heading">
                <p class="section-label">List</p>
                <h2 id="detail-title" class="section-title">タイトル</h2>
            </div>
            <div id="detail-list" class="vertical-list"></div>
        </section>
    </main>

    <aside class="kairu-assistant" aria-live="polite">
        <div id="kairu-textbox" class="kairu-textbox">何かお困りのことはありますか？</div>
        <img id="kairu-image" src="kairu.png" alt="カイル" width="320" height="320">
    </aside>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>目安箱</p>
            <nav class="footer-links" aria-label="フッターリンク">
                <span>学校生活の気づきや改善案を集めるための投稿スペースです。</span>
                <a href="terms.html">利用規約</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
