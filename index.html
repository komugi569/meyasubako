<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの目安箱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>みんなの目安箱 📮</h1>
    </header>

    <main>
        <section class="post-section">
            <h2>新しい意見を投稿する</h2>
            <textarea id="suggestion-input" placeholder="学校を良くするための意見を書いてね！" rows="4"></textarea>
            <button id="submit-btn">投稿する</button>
        </section>

        <section class="ranking-section">
            <h2>現在のランキング 🏆</h2>
            <ul id="suggestion-list">
                
                <li class="suggestion-card">
                    <div class="rank-badge rank-1">1</div>
                    <div class="content">
                        <p class="text">体育館にエアコンをつけてほしいです。夏場の集会が本当にしんどいです。</p>
                        <div class="actions">
                            <button class="like-btn">❤️ いいね</button>
                            <span class="like-count">128</span>
                        </div>
                    </div>
                </li>

                <li class="suggestion-card">
                    <div class="rank-badge rank-2">2</div>
                    <div class="content">
                        <p class="text">学食のメニューにデザートを追加してほしい！</p>
                        <div class="actions">
                            <button class="like-btn">❤️ いいね</button>
                            <span class="like-count">95</span>
                        </div>
                    </div>
                </li>

                <li class="suggestion-card">
                    <div class="rank-badge rank-3">3</div>
                    <div class="content">
                        <p class="text">図書室の開館時間をあと30分延ばしてもらえませんか？</p>
                        <div class="actions">
                            <button class="like-btn">❤️ いいね</button>
                            <span class="like-count">62</span>
                        </div>
                    </div>
                </li>

            </ul>
        </section>
    </main>
</body>
</html>
