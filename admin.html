<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目安箱 - 🛡️管理者ダッシュボード</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 8px; }
        
        /* 検索・操作バーの装飾 */
        .control-bar { background: #2c3e50; padding: 15px; margin-bottom: 20px; border-radius: 5px; display: flex; gap: 20px; align-items: center; border: 1px solid #7f8c8d; }
        .bulk-delete-btn { background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .bulk-delete-btn:hover { background: #d35400; }
        
        .post { background: #ecf0f1; color: #333; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .post-content { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .post-check { transform: scale(1.5); cursor: pointer; } /* チェックボックスを少し大きく */
        
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; min-width: 80px; }
        .delete-btn:hover { background: #c0392b; }
        input[type="password"] { padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 20px; border-radius: 4px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ 管理者専用ダッシュボード</h2>
        <p>Vercelで設定した ADMIN_PASSWORD を入力してください</p>
        <input type="password" id="adminPass" placeholder="パスワードを入力...">
        
        <div class="control-bar">
            <label style="cursor: pointer; font-weight: bold;">
                <input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll()" class="post-check"> 
                すべて選択
            </label>
            <button class="bulk-delete-btn" onclick="deleteSelectedPosts()">🗑️ 選択した項目を一括削除</button>
        </div>

        <div id="admin-list">
            <p>読み込み中...</p>
        </div>
    </div>

    <script>
        // 💡 ここにGASのURLを定義します！（エラーの原因はこれがないことでした）
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxZztgHvkKfaH3WPkWEH8f9KoiBSAFNrbPFgKkbAbLnyy_-VNjhBHSfIJ04DGJraM0T/exec";

        // ==========================================
        // 📦 投稿一覧を読み込んで表示する処理（管理者・情報開示版）
        // ==========================================
        async function loadAdminPosts() {
            const adminList = document.getElementById("admin-list");
            adminList.innerHTML = "<p>読み込み中...</p>";
            
            const pass = document.getElementById("adminPass").value;
            if (!pass) {
                adminList.innerHTML = "<p style='color:#e74c3c;'>パスワードを入力すると一覧が同期されます</p>";
                return;
            }

            try {
                // ① 💡 管理者専用の、誰が書いたかがわかるAPIから意見を取得
                const response = await fetch(`/api/admin/suggestions?password=${encodeURIComponent(pass)}`); 
                if (!response.ok) throw new Error("パスワードが違うか、認証エラー");
                const suggestions = await response.json();

                // ② フォームの意見を取得
                const gasRes = await fetch(GAS_URL);
                const formData = await gasRes.json();

                // ③ 非表示リストを取得
                const delRes = await fetch("/api/deleted_forms");
                const deletedFormIds = await delRes.json();

                // ④ フォームデータの整形
                const formSuggestions = formData.map((item, idx) => {
                    const timeId = item.timestamp ? new Date(item.timestamp).getTime() : idx;
                    return {
                        id: `form-${timeId}`,
                        text: item.content,
                        likes: 0, 
                        isForm: true,
                        user_name: "Googleフォーム（外部）",
                        user_email: "-",
                        created_at: item.timestamp ? new Date(item.timestamp).getTime() : 0 
                    };
                });

                // ⑤ 合体させて、非表示リストに入っていないものを抽出
                let combined = suggestions.concat(formSuggestions);
                const activePosts = combined.filter(post => !deletedFormIds.includes(post.id));

                adminList.innerHTML = "";
                if (activePosts.length === 0) {
                    adminList.innerHTML = "<p>現在の投稿はありません。</p>";
                    return;
                }

                // ⑥ 画面に一覧を描画
                activePosts.forEach(post => {
                    const postDiv = document.createElement("div");
                    postDiv.className = "post";

                    const contentDiv = document.createElement("div");
                    contentDiv.className = "post-content";
                    contentDiv.style.flexDirection = "column"; // 縦並びにして情報を見やすくする
                    contentDiv.style.alignItems = "flex-start";
                    
                    // 上段: チェックボックス ＋ 投稿テキスト
                    const topRow = document.createElement("div");
                    topRow.style.display = "flex";
                    topRow.style.alignItems = "center";
                    topRow.style.gap = "10px";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.className = "post-check";
                    checkbox.value = post.id; 

                    const textSpan = document.createElement("span");
                    textSpan.textContent = (post.isForm ? "【📋】 " : "【📝】 ") + post.text;
                    
                    topRow.appendChild(checkbox);
                    topRow.appendChild(textSpan);

                    // 下段: 🔍 誰が投稿したかの身元情報（ここがポイント！）
                    const infoDiv = document.createElement("div");
                    infoDiv.style.fontSize = "0.85em";
                    infoDiv.style.color = "#bdc3c7";
                    infoDiv.style.marginTop = "5px";
                    infoDiv.style.paddingLeft = "30px";
                    infoDiv.innerHTML = `👤 投稿者: <strong>${post.user_name || "不明"}</strong> ✉️ メール: <code>${post.user_email || "-"}</code>`;

                    contentDiv.appendChild(topRow);
                    contentDiv.appendChild(infoDiv);

                    // 🏷️ 右側: ステータス変更プルダウン ＋ 削除ボタン
                    const rightDiv = document.createElement("div");
                    rightDiv.style.display = "flex";
                    rightDiv.style.gap = "10px";
                    rightDiv.style.alignItems = "center";

                    const statusSelect = document.createElement("select");
                    statusSelect.style.padding = "5px";
                    statusSelect.style.borderRadius = "4px";
                    ["検討中", "対応中", "解決済み"].forEach(st => {
                        const opt = document.createElement("option");
                        opt.value = st;
                        opt.textContent = st;
                        if ((post.status || "検討中") === st) opt.selected = true;
                        statusSelect.appendChild(opt);
                    });
                    // 選択が変わったら即座にAPIでステータス変更
                    statusSelect.onchange = () => updateStatus(post.id, statusSelect.value);

                    const deleteBtn = document.createElement("button");
                    deleteBtn.className = "delete-btn";
                    deleteBtn.textContent = "🗑️ 削除";
                    deleteBtn.onclick = () => deletePost(post.id);

                    rightDiv.appendChild(statusSelect);
                    rightDiv.appendChild(deleteBtn);

                    postDiv.appendChild(contentDiv);
                    postDiv.appendChild(rightDiv);
                    adminList.appendChild(postDiv);
                });

            } catch (error) {
                console.error("読み込みエラー:", error);
                adminList.innerHTML = `<p style='color:#e74c3c;'>エラー: パスワードを確認するか、再入力してください。</p>`;
            }
        }

        // 💡 ステータスを更新する関数（新規追記）
        async function updateStatus(docId, newStatus) {
            const pass = document.getElementById("adminPass").value;
            try {
                const response = await fetch(`/api/suggestions/${docId}/status`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pass, status: newStatus })
                });
                if (response.ok) {
                    alert(`ステータスを「${newStatus}」に更新しました！`);
                } else {
                    alert("ステータスの更新に失敗しました。");
                }
            } catch (error) {
                alert("通信エラーが発生しました。");
            }
        }

        // パスワード入力欄から手を離した(またはエンターを押した)時にも自動同期させる
        document.getElementById("adminPass").addEventListener("change", loadAdminPosts);
    </script>
</body>
</html>
