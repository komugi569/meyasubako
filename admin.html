<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目安箱 - 🛡️管理者ダッシュボード</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 8px; }
        .control-bar { background: #2c3e50; padding: 15px; margin-bottom: 20px; border-radius: 5px; display: flex; gap: 20px; align-items: center; border: 1px solid #7f8c8d; }
        .bulk-delete-btn { background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .bulk-delete-btn:hover { background: #d35400; }
        .post { background: #ecf0f1; color: #333; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .post-content { flex: 1; }
        .post-meta { font-size: 0.85em; color: #7f8c8d; margin-top: 5px; }
        .author-info { color: #c0392b; font-weight: bold; }
        .actions { display: flex; gap: 10px; align-items: center; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .status-select { padding: 5px; border-radius: 3px; border: 1px solid #ccc; }
        .form-dummy { border-left: 5px solid #27ae60; }
        .post-check { margin-right: 15px; transform: scale(1.5); cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ 目安箱 管理者ダッシュボード</h1>
        
        <div class="control-bar">
            <div>
                <label for="adminPass">🔑 管理者パスワード:</label>
                <input type="password" id="adminPass" placeholder="パスワードを入力">
            </div>
            <button class="bulk-delete-btn" type="button" onclick="deleteSelectedPosts()">🗑️ 選択した項目を一括削除</button>
        </div>

        <div id="admin-list">
            <p>パスワードを入力すると投稿が表示されます。</p>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return escape[match];
            });
        }

        function formatDate(timestamp) {
            if (!timestamp) return "日付不明";
            const d = new Date(timestamp);
            return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        async function loadAdminPosts() {
            const pass = document.getElementById("adminPass").value;
            const list = document.getElementById("admin-list");
            if (!pass) return;

            list.innerHTML = "<p>読み込み中...</p>";

            try {
                // 修正: POSTリクエスト化し、URLからパスワードを隠蔽（CWE-598対策）
                const url = `/api/admin/suggestions`;
                const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: pass })
            });
                
                if (!res.ok) {
                    list.innerHTML = `<p style="color:#e74c3c;">エラー: パスワードが違うか、サーバーエラーです。</p>`;
                    return;
                }

                const json = await res.json();
                const posts = json.data;

                if (posts.length === 0) {
                    list.innerHTML = "<p>投稿はありません。</p>";
                    return;
                }

                list.innerHTML = "";
                posts.forEach(p => {
                    const div = document.createElement("div");
                    div.className = `post ${p.is_form_dummy ? 'form-dummy' : ''}`;
                    
                    const isGoogleForm = p.id.startsWith("form-");

                    div.innerHTML = `
                        <input type="checkbox" class="post-check" value="${p.id}">
                        <div class="post-content">
                            <div style="font-size: 1.1em;">${escapeHtml(p.text)}</div>
                            <div class="post-meta">
                                ❤️ ${p.likes} | 📅 ${formatDate(p.created_at)} 
                                ${isGoogleForm ? ' | 🟢 Googleフォーム' : ' | 🔵 Webアプリ'}
                            </div>
                            ${!isGoogleForm ? `
                            <div class="author-info">
                                👤 ${escapeHtml(p.user_name)} (${escapeHtml(p.user_email)})
                            </div>
                            ` : ''}
                        </div>
                        <div class="actions">
                            <select class="status-select" onchange="updateStatus('${p.id}', this.value)">
                                <option value="検討中" ${p.status === '検討中' ? 'selected' : ''}>検討中</option>
                                <option value="対応中" ${p.status === '対応中' ? 'selected' : ''}>対応中</option>
                                <option value="解決済" ${p.status === '解決済' ? 'selected' : ''}>解決済</option>
                                <option value="見送り" ${p.status === '見送り' ? 'selected' : ''}>見送り</option>
                            </select>
                            <button class="delete-btn" type="button" onclick="deletePost('${p.id}')">削除</button>
                        </div>
                    `;
                    list.appendChild(div);
                });

            } catch (error) {
                list.innerHTML = `<p style="color:#e74c3c;">通信エラーが発生しました。</p>`;
            }
        }

        async function updateStatus(docId, newStatus) {
            const pass = document.getElementById("adminPass").value;
            try {
                const res = await fetch(`/api/suggestions/${docId}/status`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: newStatus, password: pass })
                });
                if (!res.ok) alert("ステータスの更新に失敗しました。");
            } catch(e) {
                alert("通信エラーが発生しました。");
            }
        }

        async function deletePost(docId) {
            const pass = document.getElementById("adminPass").value;
            if (!pass) {
                alert("パスワードを入力してください！");
                return;
            }
            if (!confirm("本当に削除しますか？")) return;

            try {
                const res = await fetch("/api/delete", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ doc_id: docId, password: pass })
                });
                if (res.ok) {
                    alert("削除しました！");
                    loadAdminPosts();
                } else {
                    alert("削除に失敗しました。");
                }
            } catch (error) {
                alert("通信エラーが発生しました。");
            }
        }

        async function deleteSelectedPosts() {
            const checkboxes = document.querySelectorAll("#admin-list .post-check:checked");
            const selectedIds = Array.from(checkboxes).map(cb => cb.value);
            if (selectedIds.length === 0) { alert("削除する項目が選択されていません。"); return; }
            const pass = document.getElementById("adminPass").value;
            if (!pass) { alert("パスワードを入力してください！"); return; }
            if (!confirm(`選択された ${selectedIds.length} 件の投稿を一括削除します。よろしいですか？`)) return;

            try {
                const deletePromises = selectedIds.map(id => 
                    fetch("/api/delete", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ doc_id: id, password: pass })
                    })
                );
                await Promise.all(deletePromises);
                alert("一括削除が完了しました！");
                loadAdminPosts();
            } catch (error) {
                alert("一部の削除に失敗しました。");
            }
        }

        document.getElementById("adminPass").addEventListener("change", loadAdminPosts);
    </script>
</body>
</html>
