<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目安箱 - 🛡️管理者ダッシュボード</title>
    <style>
        /* 管理画面だと分かりやすいように、背景を少し暗い色にします */
        body { font-family: sans-serif; background-color: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 8px; }
        .post { background: #ecf0f1; color: #333; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background: #c0392b; }
        input[type="password"] { padding: 10px; width: 80%; margin-bottom: 20px; border-radius: 4px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ 管理者専用ダッシュボード</h2>
        <p>Vercelで設定した ADMIN_PASSWORD を入力してください</p>
        <input type="password" id="adminPass" placeholder="パスワードを入力...">
        
        <hr>
        <div id="admin-list">
            <p>※ここに投稿一覧が読み込まれます（実装に合わせて読み込み処理を追加してください）</p>
        </div>
    </div>

    <script>
        // ==========================================
        // 🗑️ 削除ボタンを押したときの処理
        // ==========================================
        async function deletePost(docId) {
            const pass = document.getElementById("adminPass").value;
            
            if (!pass) {
                alert("パスワードを入力してください！");
                return;
            }

            if (!confirm("本当にこの投稿を削除しますか？")) return;

            try {
                // 前回作った Python の削除APIを呼び出す
                const response = await fetch("/api/delete", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ doc_id: docId, password: pass })
                });
                
                if (response.ok) {
                    alert("削除しました！");
                    location.reload(); // 画面を更新
                } else {
                    alert("パスワードが違うか、エラーが発生しました。");
                }
            } catch (error) {
                console.error("エラー:", error);
                alert("通信エラーが発生しました。");
            }
        }

       // ==========================================
        // 📦 投稿一覧を読み込んで表示する処理
        // ==========================================
        async function loadAdminPosts() {
            const adminList = document.getElementById("admin-list");
            adminList.innerHTML = "<p>読み込み中...</p>"; // ローディング表示

            try {
                // いつものように投稿一覧を取得するAPIを叩く
                // ※もしあなたのアプリの取得APIのURLが違う場合は書き換えてください
                const response = await fetch("/api/suggestions"); 
                const posts = await response.json();

                adminList.innerHTML = ""; // ローディングの文字を消す

                if (posts.length === 0) {
                    adminList.innerHTML = "<p>現在の投稿はありません。</p>";
                    return;
                }

                // 取得した投稿の数だけループして画面に表示する
                posts.forEach(post => {
                    const postDiv = document.createElement("div");
                    postDiv.className = "post";

                    // 意見のテキスト部分
                    const textSpan = document.createElement("span");
                    textSpan.textContent = post.text;

                    // 🗑️ 削除ボタン部分
                    const deleteBtn = document.createElement("button");
                    deleteBtn.className = "delete-btn";
                    deleteBtn.textContent = "🗑️ 削除";
                    
                    // ここが重要！ボタンを押した時に、その投稿のIDを deletePost に渡す
                    deleteBtn.onclick = () => deletePost(post.id);

                    // 画面にくっつける
                    postDiv.appendChild(textSpan);
                    postDiv.appendChild(deleteBtn);
                    adminList.appendChild(postDiv);
                });

            } catch (error) {
                console.error("読み込みエラー:", error);
                adminList.innerHTML = "<p>データの読み込みに失敗しました。</p>";
            }
        }

        // 画面が開いた瞬間に、この読み込み処理を自動スタートさせる
        window.onload = loadAdminPosts;

    </script>
</body>
</html>
